<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <aside class="side-pannel">
        <button class="side-pannel__burger">☰</button>
        <!-- <button>→</button> -->
        <h3 class="side-pannel__title">Period</h3>
        <div class="period-block">
            <select name="months" id="">
                <option value="January">January</option>
                <option value="February">February</option>
                <option value="March">March</option>
                <option value="April">April</option>
                <option value="May">May</option>
                <option value="June">June</option>
                <option value="July">July</option>
                <option value="August">August</option>
                <option value="September">September</option>
                <option value="October">October</option>
                <option value="November">November</option>
                <option value="December">December</option>
            </select>
            <select name="year" id="">
                <option value="2025">2025</option>
                <option value="2026">2026</option>
                <option value="2027">2027</option>
            </select>
        </div>
        <ul>
            <li class="nav__item active">Projects</li>
            <li class="nav__item">Employees</li>
        </ul>
    </aside>
    <div class="main">
        <header class="header">
            <h1 class="header__title">Projects</h1>
            <div class="projects__btns">
                <button class="projects__btn">+ Add Project</button>
                <button class="projects__btn">Seed Data</button>
            </div>
        </header>
        <table>
            <thead>
                <tr>
                    <th class="sort">Company Name
                        <span class="sort__icon">⇅</span><span class="search__icon">⌕</span>
                    </th>
                    <th class="sort">Project Name
                        <span class="sort__icon">⇅</span><span class="search__icon">⌕</span>
                    </th>
                    <th class="sort">
                        Budget
                        <span class="sort__icon">⇅</span>
                    </th>
                    <th class="sort">
                        Employee Capacity 
                        <span class="sort__icon">⇅</span>
                    </th>
                    <th>Employees</th>
                    <th class="sort">Estimated Income 
                        <span class="sort__icon">⇅</span>
                    </th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <div class="info">
            <strong>Total Estimated Income:</strong>
            <span class="info__amount pos">$0.00</span>
        </div>
    </div>
